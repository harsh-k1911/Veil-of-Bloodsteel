<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
    <a href="index.html" class="logo">Shadow Market</a>
    <a href="cart.html" class="cart-link" aria-label="Open inventory">
      <span class="cart-icon">🛒</span>
      <span id="cart-count" class="cart-count">0</span>
    </a>
  </header>

  <main>
    <section class="hero">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1>Enter the Shadow Market</h1>
        <p>Rare weapons forged in silence. Power traded in shadows.</p>
        <a href="#products" class="btn btn-primary">Explore Collection</a>
      </div>
    </section>

    <section id="products" class="products-section">
      <div class="section-heading">
        <h2>Arsenal</h2>
        <p>Silent steel and tactical gear for masters of stealth.</p>
      </div>
      <div id="product-grid" class="product-grid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
